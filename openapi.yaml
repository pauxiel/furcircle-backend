openapi: 3.0.3

info:
  title: FurCircle API
  description: |
    Backend API for the FurCircle pet services marketplace.

    ## Authentication
    Most endpoints require a **Cognito JWT** token obtained after signing in.
    Pass it as a Bearer token in the `Authorization` header:
    ```
    Authorization: Bearer <your-jwt-token>
    ```

    Admin-only endpoints (create/update/delete) use **AWS IAM Signature Version 4 (SigV4)**.
    These are intended for internal/admin tooling only and are not accessible to regular users.

  version: 1.0.0
  contact:
    name: FurCircle Team

servers:
  - url: https://88m7wcqc8l.execute-api.us-east-1.amazonaws.com/dev
    description: Dev environment

tags:
  - name: Authentication
    description: |
      Authentication is handled by **Amazon Cognito** — not by the FurCircle API Gateway.
      The endpoints in this section hit the Cognito User Pools API directly.

      **Base URL for all auth calls:**
      ```
      https://cognito-idp.us-east-1.amazonaws.com/
      ```

      **Required header on every auth request:**
      ```
      Content-Type: application/x-amz-json-1.1
      ```

      **ClientId (use in every request body):** `50sjjavobi0e2q9kndlh3mfuk7`

      **Typical flow:**
      1. `POST /auth/signup` → create account
      2. `POST /auth/confirm` → verify email (code sent to inbox)
      3. `POST /auth/signin` → receive `IdToken`, `AccessToken`, `RefreshToken`
      4. Use `IdToken` as `Authorization: Bearer <IdToken>` on all FurCircle API calls

  - name: Dog Services
    description: Browse, search, and manage pet services
  - name: Categories
    description: Service categories (grooming, training, vet, etc.)
  - name: Businesses
    description: Dog business profiles (business owner dashboard)
  - name: Bookings
    description: Service bookings — pet owners create bookings, businesses view incoming bookings
  - name: Chatbot
    description: AI-powered pet care assistant (powered by Amazon Bedrock / Claude)

# ---------------------------------------------------------------------------
# Security Schemes
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    CognitoAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from Amazon Cognito. Obtain by signing in via the app.

    AwsIamAuth:
      type: apiKey
      in: header
      name: Authorization
      description: |
        AWS Signature Version 4 (SigV4). Admin-only endpoints.
        Use the AWS CLI or an AWS SDK to sign requests with IAM credentials.

  # ---------------------------------------------------------------------------
  # Reusable Schemas
  # ---------------------------------------------------------------------------
  schemas:
    DogService:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        name:
          type: string
          example: "Premium Dog Grooming"
        category:
          type: string
          example: "grooming"
        description:
          type: string
          example: "Full grooming session including bath, trim, and nail clipping."
        price:
          type: string
          example: "$45"
        rating:
          type: number
          format: float
          minimum: 0
          maximum: 5
          example: 4.8
        image:
          type: string
          example: "https://example.com/images/grooming.jpg"
        location:
          type: string
          example: "New York, NY"
        createdAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00.000Z"

    Category:
      type: object
      properties:
        slug:
          type: string
          example: "grooming"
          description: URL-friendly unique identifier
        name:
          type: string
          example: "Grooming"
        description:
          type: string
          example: "Professional grooming services for your dog."
        icon:
          type: string
          example: "scissors"
        sortOrder:
          type: integer
          example: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
          example: "user"
        content:
          type: string
          example: "What vaccinations does my puppy need?"

    ConversationSummary:
      type: object
      properties:
        conversationId:
          type: string
          format: uuid
          example: "c1d2e3f4-a5b6-7890-cdef-ab1234567890"
        title:
          type: string
          example: "What vaccinations does my puppy need?"
          description: Auto-generated from the first 50 characters of the first message
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ConversationDetail:
      allOf:
        - $ref: '#/components/schemas/ConversationSummary'
        - type: object
          properties:
            messages:
              type: array
              items:
                $ref: '#/components/schemas/ChatMessage'

    PaginatedDogServices:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DogService'
        count:
          type: integer
          example: 10
        lastEvaluatedKey:
          type: object
          nullable: true
          description: DynamoDB pagination cursor. Pass this back as a query param in the next request if present.

    Business:
      type: object
      properties:
        businessId:
          type: string
          format: uuid
          example: "b1c2d3e4-f5a6-7890-bcde-f12345678901"
        ownerId:
          type: string
          description: Cognito sub of the business owner
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        name:
          type: string
          example: "Happy Paws Grooming"
        email:
          type: string
          format: email
          example: "happypaws@gmail.com"
        phone:
          type: string
          example: "+2348012345678"
        location:
          type: string
          example: "Lagos, Nigeria"
        description:
          type: string
          example: "Professional grooming for all dog breeds."
        status:
          type: string
          enum: [active, inactive]
          example: "active"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Booking:
      type: object
      properties:
        bookingId:
          type: string
          format: uuid
          example: "d4e5f6a7-b8c9-0123-defa-b12345678902"
        userId:
          type: string
          description: Cognito sub of the pet owner
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        serviceId:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        businessId:
          type: string
          format: uuid
          example: "b1c2d3e4-f5a6-7890-bcde-f12345678901"
        scheduledAt:
          type: string
          format: date-time
          example: "2026-03-15T10:00:00.000Z"
        notes:
          type: string
          example: "My dog is nervous around strangers, please be gentle."
        status:
          type: string
          enum: [pending, confirmed, completed, cancelled]
          example: "pending"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        message:
          type: string
          example: "Missing required fields: name and category are required"

    Pet:
      type: object
      properties:
        petId:
          type: string
          format: uuid
        ownerId:
          type: string
        name:
          type: string
          example: "Max"
        type:
          type: string
          example: "Dog"
        breed:
          type: string
          example: "Golden Retriever"
        gender:
          type: string
          enum: [Male, Female]
        weight:
          type: number
          example: 21.5
        birthday:
          type: string
          format: date
          example: "2020-04-15"
        about:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WellnessLog:
      type: object
      properties:
        logId:
          type: string
          format: uuid
        petId:
          type: string
        ownerId:
          type: string
        pillar:
          type: string
          enum: [behaviour, nutrition, activity, socialisation]
        score:
          type: integer
          minimum: 0
          maximum: 100
        note:
          type: string
        loggedAt:
          type: string
          format: date-time

    WellnessSummary:
      type: object
      properties:
        petId:
          type: string
        overall:
          type: integer
          nullable: true
          description: Average of all logged pillars, null if no logs yet
        pillars:
          type: array
          items:
            type: object
            properties:
              pillar:
                type: string
                enum: [behaviour, nutrition, activity, socialisation]
              score:
                type: integer
                nullable: true
              lastLoggedAt:
                type: string
                format: date-time
                nullable: true
        totalLogs:
          type: integer

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  # ==========================================================================
  # DOG SERVICES
  # ==========================================================================

  /dogservices:
    get:
      tags: [Dog Services]
      operationId: listDogServices
      summary: List dog services
      description: |
        Returns a paginated list of dog services.
        Optionally filter by category using the `category` query parameter.
      security:
        - CognitoAuth: []
      parameters:
        - name: category
          in: query
          required: false
          description: Filter by category slug (e.g. `grooming`, `training`)
          schema:
            type: string
            example: grooming
        - name: limit
          in: query
          required: false
          description: Maximum number of results to return (1–100, default 20)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: List of dog services
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDogServices'
        '401':
          description: Unauthorized — missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [Dog Services]
      operationId: createDogService
      summary: Create a dog service (admin only)
      description: |
        Creates a new dog service listing.
        **Requires AWS IAM authentication** — admin use only.
      security:
        - AwsIamAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, category]
              properties:
                name:
                  type: string
                  example: "Premium Dog Grooming"
                category:
                  type: string
                  example: "grooming"
                description:
                  type: string
                  example: "Full grooming session including bath, trim, and nail clipping."
                price:
                  type: string
                  example: "$45"
                rating:
                  type: number
                  example: 4.8
                image:
                  type: string
                  example: "https://example.com/images/grooming.jpg"
                location:
                  type: string
                  example: "New York, NY"
      responses:
        '201':
          description: Dog service created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DogService'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — IAM credentials required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /dogservices/search:
    post:
      tags: [Dog Services]
      operationId: searchDogServices
      summary: Search dog services
      description: |
        Full-text search across service `name` and `description` fields.
        Optionally narrow results by category.
        Note: Search is case-sensitive.
      security:
        - CognitoAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  description: Search term (case-sensitive)
                  example: "grooming"
                category:
                  type: string
                  description: Optional category filter
                  example: "grooming"
                limit:
                  type: integer
                  description: Maximum results to return (1–100, default 20)
                  default: 20
                  minimum: 1
                  maximum: 100
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/DogService'
                  count:
                    type: integer
                    example: 3
                  query:
                    type: string
                    example: "grooming"
                  category:
                    type: string
                    nullable: true
                    example: "grooming"
        '400':
          description: Search query is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /dogservices/{id}:
    get:
      tags: [Dog Services]
      operationId: getDogService
      summary: Get a dog service by ID
      security:
        - CognitoAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the dog service
          schema:
            type: string
            format: uuid
            example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      responses:
        '200':
          description: Dog service found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DogService'
        '404':
          description: Dog service not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags: [Dog Services]
      operationId: updateDogService
      summary: Update a dog service (admin only)
      description: |
        Partially updates a dog service. Only the fields provided in the body will be updated.
        **Requires AWS IAM authentication** — admin use only.
      security:
        - AwsIamAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the dog service to update
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        description: At least one field must be provided.
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                category:
                  type: string
                description:
                  type: string
                price:
                  type: string
                rating:
                  type: number
                image:
                  type: string
                location:
                  type: string
      responses:
        '200':
          description: Updated dog service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DogService'
        '400':
          description: No fields to update, or missing ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Dog service not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — IAM credentials required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [Dog Services]
      operationId: deleteDogService
      summary: Delete a dog service (admin only)
      description: |
        Permanently deletes a dog service.
        **Requires AWS IAM authentication** — admin use only.
      security:
        - AwsIamAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the dog service to delete
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Dog service deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Dog service deleted successfully"
        '404':
          description: Dog service not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — IAM credentials required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==========================================================================
  # CATEGORIES
  # ==========================================================================

  /categories:
    get:
      tags: [Categories]
      operationId: listCategories
      summary: List all categories
      description: Returns all service categories sorted by `sortOrder`.
      security:
        - CognitoAuth: []
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
                  count:
                    type: integer
                    example: 5
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [Categories]
      operationId: createCategory
      summary: Create a category (admin only)
      description: |
        Creates a new service category.
        **Requires AWS IAM authentication** — admin use only.
      security:
        - AwsIamAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug]
              properties:
                name:
                  type: string
                  example: "Grooming"
                slug:
                  type: string
                  example: "grooming"
                  description: URL-friendly identifier, must be unique
                description:
                  type: string
                  example: "Professional grooming services for your dog."
                icon:
                  type: string
                  example: "scissors"
                sortOrder:
                  type: integer
                  default: 0
                  example: 1
      responses:
        '201':
          description: Category created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — IAM credentials required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /categories/{slug}:
    get:
      tags: [Categories]
      operationId: getCategory
      summary: Get a category with its services
      description: Returns a single category along with all dog services that belong to it.
      security:
        - CognitoAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          description: The category slug (e.g. `grooming`)
          schema:
            type: string
            example: grooming
      responses:
        '200':
          description: Category with its services
          content:
            application/json:
              schema:
                type: object
                properties:
                  category:
                    $ref: '#/components/schemas/Category'
                  services:
                    type: array
                    items:
                      $ref: '#/components/schemas/DogService'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==========================================================================
  # CHATBOT
  # ==========================================================================

  /chatbot/chat:
    post:
      tags: [Chatbot]
      operationId: sendChatMessage
      summary: Send a message to the pet assistant
      description: |
        Sends a message to FurCircle's AI pet care assistant (powered by Amazon Bedrock / Claude).

        - If no `conversationId` is provided, a **new conversation** is created and a new `conversationId` is returned.
        - If a `conversationId` is provided, the message is appended to that existing conversation (maintaining context).
        - Conversations are automatically deleted after **14 days** (TTL).

        The assistant is aware of all FurCircle services and general pet care knowledge (nutrition, health, grooming, training, etc.).
      security:
        - CognitoAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  example: "What vaccinations does my puppy need at 8 weeks?"
                conversationId:
                  type: string
                  format: uuid
                  nullable: true
                  description: |
                    Omit to start a new conversation.
                    Pass the `conversationId` returned from a previous chat response to continue the conversation.
                  example: "c1d2e3f4-a5b6-7890-cdef-ab1234567890"
      responses:
        '200':
          description: Assistant response
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversationId:
                    type: string
                    format: uuid
                    description: Use this ID to continue the conversation in future requests.
                    example: "c1d2e3f4-a5b6-7890-cdef-ab1234567890"
                  message:
                    type: string
                    description: The assistant's reply
                    example: "At 8 weeks, your puppy should receive the first dose of the DHPP combination vaccine..."
        '400':
          description: Message is required or empty
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error (e.g. Bedrock unavailable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /chatbot/conversations:
    get:
      tags: [Chatbot]
      operationId: listConversations
      summary: List user's conversations
      description: |
        Returns a summary list of all conversations for the authenticated user.
        Results are ordered by most recently updated.
        Full message history is **not** included — use `/chatbot/history/{conversationId}` for that.
      security:
        - CognitoAuth: []
      responses:
        '200':
          description: List of conversation summaries
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConversationSummary'
                  count:
                    type: integer
                    example: 3
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /chatbot/history/{conversationId}:
    get:
      tags: [Chatbot]
      operationId: getConversationHistory
      summary: Get full conversation history
      description: |
        Returns a single conversation with its full message history (all user and assistant messages).
        Only the owner of the conversation can access it.
      security:
        - CognitoAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          description: UUID of the conversation
          schema:
            type: string
            format: uuid
            example: "c1d2e3f4-a5b6-7890-cdef-ab1234567890"
      responses:
        '200':
          description: Full conversation with message history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationDetail'
        '404':
          description: Conversation not found or does not belong to this user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==========================================================================
  # BUSINESSES
  # ==========================================================================

  /businesses:
    post:
      tags: [Businesses]
      operationId: createBusiness
      summary: Create a business profile (admin only)
      description: |
        Creates a new dog business profile linked to a Cognito business owner account.
        **Requires AWS IAM authentication** — admin use only.

        **Typical onboarding flow:**
        1. Admin creates the Cognito account: `aws cognito-idp admin-create-user ...`
        2. Admin adds user to Businesses group: `aws cognito-idp admin-add-user-to-group ...`
        3. Admin calls this endpoint with the owner's Cognito `sub` as `ownerId`
        4. Admin sends login credentials to the business owner
      security:
        - AwsIamAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, ownerId]
              properties:
                name:
                  type: string
                  example: "Happy Paws Grooming"
                email:
                  type: string
                  format: email
                  example: "happypaws@gmail.com"
                ownerId:
                  type: string
                  description: The Cognito `sub` of the business owner (from admin-create-user response)
                  example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                phone:
                  type: string
                  example: "+2348012345678"
                location:
                  type: string
                  example: "Lagos, Nigeria"
                description:
                  type: string
                  example: "Professional grooming for all dog breeds."
      responses:
        '201':
          description: Business created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Business'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — IAM credentials required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /businesses/me:
    get:
      tags: [Businesses]
      operationId: getMyBusiness
      summary: Get own business profile
      description: |
        Returns the business profile for the authenticated business owner.
        Used by the dashboard on load to display the business's details.
      security:
        - CognitoAuth: []
      responses:
        '200':
          description: Business profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Business'
        '404':
          description: No business found for this user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /businesses/{businessId}:
    put:
      tags: [Businesses]
      operationId: updateBusiness
      summary: Update own business profile
      description: |
        Partially updates the business profile. Only the provided fields are changed.
        The business owner can only update their own business — ownership is verified server-side.
      security:
        - CognitoAuth: []
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: string
            format: uuid
            example: "b1c2d3e4-f5a6-7890-bcde-f12345678901"
      requestBody:
        required: true
        description: At least one field must be provided.
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                phone:
                  type: string
                location:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Updated business profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Business'
        '400':
          description: No fields to update
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: You do not own this business
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Business not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==========================================================================
  # BOOKINGS
  # ==========================================================================

  /bookings:
    post:
      tags: [Bookings]
      operationId: createBooking
      summary: Create a booking
      description: |
        Pet owner creates a booking for a dog service.
        The booking is linked to both the service (`serviceId`) and the business (`businessId`).
        Initial status is always `pending`.
      security:
        - CognitoAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [serviceId, businessId, scheduledAt]
              properties:
                serviceId:
                  type: string
                  format: uuid
                  example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                businessId:
                  type: string
                  format: uuid
                  example: "b1c2d3e4-f5a6-7890-bcde-f12345678901"
                scheduledAt:
                  type: string
                  format: date-time
                  example: "2026-03-15T10:00:00.000Z"
                notes:
                  type: string
                  example: "My dog is nervous, please be gentle."
      responses:
        '201':
          description: Booking created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags: [Bookings]
      operationId: listMyBookings
      summary: List own bookings (pet owner)
      description: Returns all bookings created by the authenticated pet owner.
      security:
        - CognitoAuth: []
      responses:
        '200':
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /bookings/business:
    get:
      tags: [Bookings]
      operationId: listBusinessBookings
      summary: List incoming bookings (business owner)
      description: |
        Returns all bookings for the authenticated business owner's business.
        The business is looked up automatically from the owner's Cognito identity —
        no need to pass a `businessId`.
      security:
        - CognitoAuth: []
      responses:
        '200':
          description: List of bookings for this business
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
        '404':
          description: No business found for this user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==========================================================================
  # AUTHENTICATION (Amazon Cognito)
  # These endpoints are served by Cognito, not by the FurCircle API Gateway.
  # ==========================================================================

  /auth/signup:
    post:
      tags: [Authentication]
      operationId: signUp
      security: []
      summary: Create a new account
      description: |
        Registers a new user with email and password.
        After sign-up, Cognito sends a **verification code** to the user's email.
        The user **cannot sign in** until they confirm their email (see `/auth/confirm`).
      servers:
        - url: https://cognito-idp.us-east-1.amazonaws.com
          description: Amazon Cognito User Pools API
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum: [AmazonCognitoIdentityProviderService.SignUp]
        - name: Content-Type
          in: header
          required: true
          schema:
            type: string
            enum: [application/x-amz-json-1.1]
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              required: [ClientId, Username, Password, UserAttributes]
              properties:
                ClientId:
                  type: string
                  example: "50sjjavobi0e2q9kndlh3mfuk7"
                  description: The FurCircle web app client ID
                Username:
                  type: string
                  format: email
                  example: "john.doe@example.com"
                Password:
                  type: string
                  example: "SecurePass1!"
                  description: Min 8 chars — must include uppercase, lowercase, number, and symbol
                UserAttributes:
                  type: array
                  items:
                    type: object
                    properties:
                      Name:
                        type: string
                      Value:
                        type: string
                  example:
                    - Name: email
                      Value: "john.doe@example.com"
                    - Name: given_name
                      Value: "John"
                    - Name: family_name
                      Value: "Doe"
      responses:
        '200':
          description: User created. Verification code sent to email.
          content:
            application/x-amz-json-1.1:
              schema:
                type: object
                properties:
                  UserSub:
                    type: string
                    format: uuid
                    description: The new user's unique ID (Cognito sub)
                  UserConfirmed:
                    type: boolean
                    example: false
        '400':
          description: Invalid password, duplicate email, or missing required attributes

  /auth/confirm:
    post:
      tags: [Authentication]
      operationId: confirmSignUp
      security: []
      summary: Confirm email with verification code
      description: |
        Confirms the user's email using the 6-digit code sent by Cognito after sign-up.
        The user **cannot sign in** until this step is completed.
      servers:
        - url: https://cognito-idp.us-east-1.amazonaws.com
          description: Amazon Cognito User Pools API
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum: [AmazonCognitoIdentityProviderService.ConfirmSignUp]
        - name: Content-Type
          in: header
          required: true
          schema:
            type: string
            enum: [application/x-amz-json-1.1]
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              required: [ClientId, Username, ConfirmationCode]
              properties:
                ClientId:
                  type: string
                  example: "50sjjavobi0e2q9kndlh3mfuk7"
                Username:
                  type: string
                  format: email
                  example: "john.doe@example.com"
                ConfirmationCode:
                  type: string
                  example: "123456"
                  description: 6-digit code sent to the user's email
      responses:
        '200':
          description: Email confirmed. User can now sign in.
        '400':
          description: Incorrect or expired confirmation code

  /auth/signin:
    post:
      tags: [Authentication]
      operationId: signIn
      security: []
      summary: Sign in and get JWT tokens
      description: |
        Authenticates the user and returns JWT tokens.

        Use the **`IdToken`** as the Bearer token on all FurCircle API calls:
        ```
        Authorization: Bearer <IdToken>
        ```

        The `IdToken` expires after **1 hour**. Use the `RefreshToken` to get a new one without signing in again (see `/auth/refresh`).
      servers:
        - url: https://cognito-idp.us-east-1.amazonaws.com
          description: Amazon Cognito User Pools API
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum: [AmazonCognitoIdentityProviderService.InitiateAuth]
        - name: Content-Type
          in: header
          required: true
          schema:
            type: string
            enum: [application/x-amz-json-1.1]
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              required: [AuthFlow, ClientId, AuthParameters]
              properties:
                AuthFlow:
                  type: string
                  enum: [USER_PASSWORD_AUTH]
                ClientId:
                  type: string
                  example: "50sjjavobi0e2q9kndlh3mfuk7"
                AuthParameters:
                  type: object
                  required: [USERNAME, PASSWORD]
                  properties:
                    USERNAME:
                      type: string
                      format: email
                      example: "john.doe@example.com"
                    PASSWORD:
                      type: string
                      example: "SecurePass1!"
      responses:
        '200':
          description: Authentication successful
          content:
            application/x-amz-json-1.1:
              schema:
                type: object
                properties:
                  AuthenticationResult:
                    type: object
                    properties:
                      IdToken:
                        type: string
                        description: "Use as 'Authorization: Bearer {IdToken}' on all API calls"
                      AccessToken:
                        type: string
                      RefreshToken:
                        type: string
                        description: Store securely — use to refresh when IdToken expires
                      ExpiresIn:
                        type: integer
                        example: 3600
                        description: Token lifetime in seconds (1 hour)
                      TokenType:
                        type: string
                        example: Bearer
        '400':
          description: Incorrect username or password, or user not confirmed

  /auth/refresh:
    post:
      tags: [Authentication]
      operationId: refreshToken
      security: []
      summary: Refresh an expired IdToken
      description: |
        Uses the `RefreshToken` to obtain a new `IdToken` and `AccessToken` without requiring
        the user to sign in again. Call this when the `IdToken` has expired (after 1 hour).
      servers:
        - url: https://cognito-idp.us-east-1.amazonaws.com
          description: Amazon Cognito User Pools API
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum: [AmazonCognitoIdentityProviderService.InitiateAuth]
        - name: Content-Type
          in: header
          required: true
          schema:
            type: string
            enum: [application/x-amz-json-1.1]
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              required: [AuthFlow, ClientId, AuthParameters]
              properties:
                AuthFlow:
                  type: string
                  enum: [REFRESH_TOKEN_AUTH]
                ClientId:
                  type: string
                  example: "50sjjavobi0e2q9kndlh3mfuk7"
                AuthParameters:
                  type: object
                  required: [REFRESH_TOKEN]
                  properties:
                    REFRESH_TOKEN:
                      type: string
                      description: The RefreshToken received at sign-in
      responses:
        '200':
          description: New tokens issued
          content:
            application/x-amz-json-1.1:
              schema:
                type: object
                properties:
                  AuthenticationResult:
                    type: object
                    properties:
                      IdToken:
                        type: string
                      AccessToken:
                        type: string
                      ExpiresIn:
                        type: integer
                        example: 3600
        '400':
          description: Refresh token is invalid or expired — user must sign in again

  /auth/forgot-password:
    post:
      tags: [Authentication]
      operationId: forgotPassword
      security: []
      summary: Request a password reset code
      description: |
        Sends a 6-digit password reset code to the user's email.
        Use the code with `/auth/reset-password` to set a new password.
      servers:
        - url: https://cognito-idp.us-east-1.amazonaws.com
          description: Amazon Cognito User Pools API
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum: [AmazonCognitoIdentityProviderService.ForgotPassword]
        - name: Content-Type
          in: header
          required: true
          schema:
            type: string
            enum: [application/x-amz-json-1.1]
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              required: [ClientId, Username]
              properties:
                ClientId:
                  type: string
                  example: "50sjjavobi0e2q9kndlh3mfuk7"
                Username:
                  type: string
                  format: email
                  example: "john.doe@example.com"
      responses:
        '200':
          description: Reset code sent to email
        '400':
          description: User not found or email not confirmed

  /auth/reset-password:
    post:
      tags: [Authentication]
      operationId: resetPassword
      security: []
      summary: Set a new password using reset code
      description: |
        Resets the user's password using the 6-digit code received from `/auth/forgot-password`.
        After a successful reset, the user can sign in with the new password.
      servers:
        - url: https://cognito-idp.us-east-1.amazonaws.com
          description: Amazon Cognito User Pools API
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum: [AmazonCognitoIdentityProviderService.ConfirmForgotPassword]
        - name: Content-Type
          in: header
          required: true
          schema:
            type: string
            enum: [application/x-amz-json-1.1]
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              required: [ClientId, Username, ConfirmationCode, Password]
              properties:
                ClientId:
                  type: string
                  example: "50sjjavobi0e2q9kndlh3mfuk7"
                Username:
                  type: string
                  format: email
                  example: "john.doe@example.com"
                ConfirmationCode:
                  type: string
                  example: "123456"
                  description: 6-digit code sent to email
                Password:
                  type: string
                  example: "NewSecurePass1!"
                  description: New password — must meet the same complexity requirements as sign-up
      responses:
        '200':
          description: Password reset successfully. User can now sign in with the new password.
        '400':
          description: Incorrect or expired reset code

  /pets:
    post:
      tags: [Pet Profiles]
      operationId: createPet
      summary: Create a pet profile
      description: Creates a new pet profile owned by the authenticated user.
      security:
        - CognitoAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type]
              properties:
                name:
                  type: string
                  example: "Max"
                type:
                  type: string
                  example: "Dog"
                breed:
                  type: string
                  example: "Golden Retriever"
                gender:
                  type: string
                  enum: [Male, Female]
                weight:
                  type: number
                  example: 21.5
                birthday:
                  type: string
                  format: date
                  example: "2020-04-15"
                about:
                  type: string
                  example: "Loves fetch and long walks."
      responses:
        '201':
          description: Pet profile created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '400':
          description: Missing required fields
        '401':
          description: Unauthorized

    get:
      tags: [Pet Profiles]
      operationId: listPets
      summary: List own pet profiles
      description: Returns all pet profiles belonging to the authenticated user.
      security:
        - CognitoAuth: []
      responses:
        '200':
          description: List of pets
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Pet'
                  count:
                    type: integer
        '401':
          description: Unauthorized

  /pets/{petId}:
    parameters:
      - name: petId
        in: path
        required: true
        schema:
          type: string

    get:
      tags: [Pet Profiles]
      operationId: getPet
      summary: Get a single pet profile
      security:
        - CognitoAuth: []
      responses:
        '200':
          description: Pet profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '403':
          description: Pet belongs to another user
        '404':
          description: Pet not found

    put:
      tags: [Pet Profiles]
      operationId: updatePet
      summary: Update a pet profile
      description: Updates allowed fields. At least one field must be provided.
      security:
        - CognitoAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                breed:
                  type: string
                gender:
                  type: string
                  enum: [Male, Female]
                weight:
                  type: number
                birthday:
                  type: string
                  format: date
                about:
                  type: string
      responses:
        '200':
          description: Updated pet profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '400':
          description: No updatable fields provided
        '403':
          description: Pet belongs to another user
        '404':
          description: Pet not found

    delete:
      tags: [Pet Profiles]
      operationId: deletePet
      summary: Delete a pet profile
      security:
        - CognitoAuth: []
      responses:
        '200':
          description: Pet deleted
        '403':
          description: Pet belongs to another user
        '404':
          description: Pet not found

  /pets/{petId}/wellness:
    parameters:
      - name: petId
        in: path
        required: true
        schema:
          type: string

    post:
      tags: [Wellness]
      operationId: logWellness
      summary: Log a wellness activity for a pet
      description: |
        Records a score (0–100) for one of four wellness pillars:
        `behaviour`, `nutrition`, `activity`, or `socialisation`.
        Each log is stored independently; the GET summary shows the latest per pillar.
      security:
        - CognitoAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pillar, score]
              properties:
                pillar:
                  type: string
                  enum: [behaviour, nutrition, activity, socialisation]
                  example: activity
                score:
                  type: integer
                  minimum: 0
                  maximum: 100
                  example: 80
                note:
                  type: string
                  example: "Good walk today"
      responses:
        '201':
          description: Wellness log entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WellnessLog'
        '400':
          description: Invalid pillar or score out of range
        '403':
          description: Pet belongs to another user
        '404':
          description: Pet not found

    get:
      tags: [Wellness]
      operationId: getWellness
      summary: Get wellness summary for a pet
      description: |
        Returns the latest score for each of the four pillars, plus an overall
        score (average of pillars that have been logged at least once).
        Pillars not yet logged have `score: null`.
      security:
        - CognitoAuth: []
      responses:
        '200':
          description: Wellness summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WellnessSummary'
        '403':
          description: Pet belongs to another user
        '404':
          description: Pet not found