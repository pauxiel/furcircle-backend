# DogServices API - FurCircle Backend
service: furcircle-dogservices-api
frameworkVersion: "4"

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'us-east-1'}
  # Uncomment to easily set up a custom domain. Read the docs for more details:
  # https://www.serverless.com/framework/docs/providers/aws/guide/domains
  # domain: api.example.com

  environment:
    DOGS_SERVICES_TABLE: !Ref DogServiceTable
    SERVICE_CATEGORIES_TABLE: !Ref ServiceCategoryTable
    CHAT_CONVERSATION_TABLE: !Ref ChatConversationTable
    DOG_BUSINESS_TABLE: !Ref DogBusinessTable
    BOOKING_TABLE: !Ref BookingTable
    PET_TABLE: !Ref PetTable
    COGNITO_USER_POOL_ID: !Ref CognitoUserPool
    COGNITO_USER_POOL_ARN: !GetAtt CognitoUserPool.Arn
    COGNITO_WEB_CLIENT_ID: !Ref WebCognitoUserPoolClient
    COGNITO_SERVER_CLIENT_ID: !Ref ServerCognitoUserPoolClient
    COGNITO_IDENTITY_POOL_ID: !Ref CognitoIdentityPool
    API_ENDPOINT: !Sub "https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/${sls:stage}"

functions:
  # GET /dogservices - List all dog services (authenticated users)
  list-dogservices:
    handler: functions/dogservices/list.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Scan
          - dynamodb:Query
        Resource:
          - !GetAtt DogServiceTable.Arn
          - !Sub "${DogServiceTable.Arn}/index/*"
    events:
      - http:
          path: /dogservices
          method: get
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: !GetAtt CognitoUserPool.Arn

  # GET /dogservices/{id} - Get a single dog service (authenticated users)
  get-dogservice:
    handler: functions/dogservices/get.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
        Resource:
          - !GetAtt DogServiceTable.Arn
    events:
      - http:
          path: /dogservices/{id}
          method: get
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: !GetAtt CognitoUserPool.Arn

  # POST /dogservices/search - Search dog services (authenticated users)
  search-dogservices:
    handler: functions/dogservices/search.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Scan
        Resource:
          - !GetAtt DogServiceTable.Arn
    events:
      - http:
          path: /dogservices/search
          method: post
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: !GetAtt CognitoUserPool.Arn

  # POST /dogservices - Create a new dog service (admin only - IAM auth)
  create-dogservice:
    handler: functions/dogservices/create.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:PutItem
        Resource:
          - !GetAtt DogServiceTable.Arn
    events:
      - http:
          path: /dogservices
          method: post
          cors: true
          authorizer: aws_iam

  # PUT /dogservices/{id} - Update a dog service (admin only - IAM auth)
  update-dogservice:
    handler: functions/dogservices/update.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:UpdateItem
        Resource:
          - !GetAtt DogServiceTable.Arn
    events:
      - http:
          path: /dogservices/{id}
          method: put
          cors: true
          authorizer: aws_iam

  # DELETE /dogservices/{id} - Delete a dog service (admin only - IAM auth)
  delete-dogservice:
    handler: functions/dogservices/delete.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:DeleteItem
        Resource:
          - !GetAtt DogServiceTable.Arn
    events:
      - http:
          path: /dogservices/{id}
          method: delete
          cors: true
          authorizer: aws_iam

  # GET /categories - List all service categories (authenticated users)
  list-categories:
    handler: functions/categories/list.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Scan
        Resource:
          - !GetAtt ServiceCategoryTable.Arn
    events:
      - http:
          path: /categories
          method: get
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: !GetAtt CognitoUserPool.Arn

  # GET /categories/{slug} - Get a category with its services (authenticated users)
  get-category:
    handler: functions/categories/get.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
        Resource:
          - !GetAtt ServiceCategoryTable.Arn
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Sub "${DogServiceTable.Arn}/index/*"
    events:
      - http:
          path: /categories/{slug}
          method: get
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: !GetAtt CognitoUserPool.Arn

  # POST /categories - Create a new category (admin only - IAM auth)
  create-category:
    handler: functions/categories/create.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:PutItem
        Resource:
          - !GetAtt ServiceCategoryTable.Arn
    events:
      - http:
          path: /categories
          method: post
          cors: true
          authorizer: aws_iam

  # POST /businesses - Create a new business (admin only - IAM auth)
  create-business:
    handler: functions/businesses/create.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:PutItem
        Resource:
          - !GetAtt DogBusinessTable.Arn
    events:
      - http:
          path: /businesses
          method: post
          cors: true
          authorizer: aws_iam

  # GET /businesses/me - Get own business profile (business owner - Cognito auth)
  get-my-business:
    handler: functions/businesses/me.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Sub "${DogBusinessTable.Arn}/index/*"
    events:
      - http:
          path: /businesses/me
          method: get
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: !GetAtt CognitoUserPool.Arn

  # PUT /businesses/{businessId} - Update business profile (business owner - Cognito auth)
  update-business:
    handler: functions/businesses/update.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Sub "${DogBusinessTable.Arn}/index/*"
      - Effect: Allow
        Action:
          - dynamodb:UpdateItem
        Resource:
          - !GetAtt DogBusinessTable.Arn
    events:
      - http:
          path: /businesses/{businessId}
          method: put
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: !GetAtt CognitoUserPool.Arn

  # POST /bookings - Create a booking (pet owner - Cognito auth)
  create-booking:
    handler: functions/bookings/create.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:PutItem
        Resource:
          - !GetAtt BookingTable.Arn
    events:
      - http:
          path: /bookings
          method: post
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: !GetAtt CognitoUserPool.Arn

  # GET /bookings - List own bookings (pet owner - Cognito auth)
  list-bookings:
    handler: functions/bookings/list.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Sub "${BookingTable.Arn}/index/*"
    events:
      - http:
          path: /bookings
          method: get
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: !GetAtt CognitoUserPool.Arn

  # GET /bookings/business - List bookings for business (business owner - Cognito auth)
  list-business-bookings:
    handler: functions/bookings/business.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Sub "${DogBusinessTable.Arn}/index/*"
          - !Sub "${BookingTable.Arn}/index/*"
    events:
      - http:
          path: /bookings/business
          method: get
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: !GetAtt CognitoUserPool.Arn

  # POST /chatbot/chat - Send a message to the pet assistant chatbot
  chat-send:
    handler: functions/chatbot/chat.handler
    timeout: 30
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:PutItem
          - dynamodb:UpdateItem
        Resource:
          - !GetAtt ChatConversationTable.Arn
      - Effect: Allow
        Action:
          - dynamodb:Scan
        Resource:
          - !GetAtt DogServiceTable.Arn
          - !GetAtt ServiceCategoryTable.Arn
      - Effect: Allow
        Action:
          - bedrock:InvokeModel
        Resource:
          - "arn:aws:bedrock:*::foundation-model/*"
    events:
      - http:
          path: /chatbot/chat
          method: post
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: !GetAtt CognitoUserPool.Arn

  # GET /chatbot/conversations - List user's conversations
  chat-conversations:
    handler: functions/chatbot/conversations.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !GetAtt ChatConversationTable.Arn
    events:
      - http:
          path: /chatbot/conversations
          method: get
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: !GetAtt CognitoUserPool.Arn

  # GET /chatbot/history/{conversationId} - Get conversation history
  chat-history:
    handler: functions/chatbot/history.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
        Resource:
          - !GetAtt ChatConversationTable.Arn
    events:
      - http:
          path: /chatbot/history/{conversationId}
          method: get
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: !GetAtt CognitoUserPool.Arn

  # POST /pets - Create a pet profile (pet owner - Cognito auth)
  create-pet:
    handler: functions/pets/create.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:PutItem
        Resource:
          - !GetAtt PetTable.Arn
    events:
      - http:
          path: /pets
          method: post
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: !GetAtt CognitoUserPool.Arn

  # GET /pets - List own pet profiles (pet owner - Cognito auth)
  list-pets:
    handler: functions/pets/list.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Sub "${PetTable.Arn}/index/*"
    events:
      - http:
          path: /pets
          method: get
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: !GetAtt CognitoUserPool.Arn

  # GET /pets/{petId} - Get a single pet profile (pet owner - Cognito auth)
  get-pet:
    handler: functions/pets/get.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
        Resource:
          - !GetAtt PetTable.Arn
    events:
      - http:
          path: /pets/{petId}
          method: get
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: !GetAtt CognitoUserPool.Arn

  # PUT /pets/{petId} - Update a pet profile (pet owner - Cognito auth)
  update-pet:
    handler: functions/pets/update.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:UpdateItem
        Resource:
          - !GetAtt PetTable.Arn
    events:
      - http:
          path: /pets/{petId}
          method: put
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: !GetAtt CognitoUserPool.Arn

  # DELETE /pets/{petId} - Remove a pet profile (pet owner - Cognito auth)
  delete-pet:
    handler: functions/pets/delete.handler
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:DeleteItem
        Resource:
          - !GetAtt PetTable.Arn
    events:
      - http:
          path: /pets/{petId}
          method: delete
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: !GetAtt CognitoUserPool.Arn

resources:
  Resources:
    DogServiceTable:
      Type: AWS::DynamoDB::Table
      Properties:
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: category
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: category-index
            KeySchema:
              - AttributeName: category
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    ServiceCategoryTable:
      Type: AWS::DynamoDB::Table
      Properties:
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: slug
            AttributeType: S
        KeySchema:
          - AttributeName: slug
            KeyType: HASH

    DogBusinessTable:
      Type: AWS::DynamoDB::Table
      Properties:
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: businessId
            AttributeType: S
          - AttributeName: ownerId
            AttributeType: S
        KeySchema:
          - AttributeName: businessId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: ownerId-index
            KeySchema:
              - AttributeName: ownerId
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    BookingTable:
      Type: AWS::DynamoDB::Table
      Properties:
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: bookingId
            AttributeType: S
          - AttributeName: userId
            AttributeType: S
          - AttributeName: businessId
            AttributeType: S
        KeySchema:
          - AttributeName: bookingId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: userId-index
            KeySchema:
              - AttributeName: userId
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: businessId-index
            KeySchema:
              - AttributeName: businessId
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    ChatConversationTable:
      Type: AWS::DynamoDB::Table
      Properties:
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
          - AttributeName: conversationId
            AttributeType: S
        KeySchema:
          - AttributeName: userId
            KeyType: HASH
          - AttributeName: conversationId
            KeyType: RANGE
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    PetTable:
      Type: AWS::DynamoDB::Table
      Properties:
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: petId
            AttributeType: S
          - AttributeName: ownerId
            AttributeType: S
        KeySchema:
          - AttributeName: petId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: ownerId-index
            KeySchema:
              - AttributeName: ownerId
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: ${self:service}-${sls:stage}
        AliasAttributes:
          - email
        UsernameConfiguration:
          CaseSensitive: false
        AutoVerifiedAttributes:
          - email
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireLowercase: true
            RequireNumbers: true
            RequireUppercase: true
            RequireSymbols: true
        Schema:
          - AttributeDataType: String
            Mutable: true
            Name: given_name
            Required: true
            StringAttributeConstraints:
              MinLength: "1"
          - AttributeDataType: String
            Mutable: true
            Name: family_name
            Required: true
            StringAttributeConstraints:
              MinLength: "1"
          - AttributeDataType: String
            Mutable: true
            Name: email
            Required: true
            StringAttributeConstraints:
              MinLength: "1"

    UsersGroup:
      Type: AWS::Cognito::UserPoolGroup
      Properties:
        GroupName: Users
        UserPoolId: !Ref CognitoUserPool
        Description: Pet owners

    BusinessesGroup:
      Type: AWS::Cognito::UserPoolGroup
      Properties:
        GroupName: Businesses
        UserPoolId: !Ref CognitoUserPool
        Description: Dog business owners

    # Google Identity Provider
    # To set up: https://console.cloud.google.com/apis/credentials
    # 1. Create OAuth 2.0 Client ID (Web application)
    # 2. Add authorized redirect URI: https://furcircle-dogservices-api-dev.auth.us-east-1.amazoncognito.com/oauth2/idpresponse
    # 3. Copy Client ID and Client Secret below
    GoogleIdentityProvider:
      Type: AWS::Cognito::UserPoolIdentityProvider
      Properties:
        UserPoolId: !Ref CognitoUserPool
        ProviderName: Google
        ProviderType: Google
        ProviderDetails:
          client_id: ${self:custom.google.clientId}
          client_secret: ${self:custom.google.clientSecret}
          authorize_scopes: "profile email openid"
        AttributeMapping:
          email: email
          given_name: given_name
          family_name: family_name
          username: sub

    # Apple Identity Provider - UNCOMMENT when you have Apple Developer credentials
    # To set up: https://developer.apple.com/account/resources/identifiers
    # 1. Create a Services ID (for Sign in with Apple)
    # 2. Create a Key with Sign in with Apple enabled
    # 3. Copy Team ID, Key ID, Services ID, and private key below
    # AppleIdentityProvider:
    #   Type: AWS::Cognito::UserPoolIdentityProvider
    #   Properties:
    #     UserPoolId: !Ref CognitoUserPool
    #     ProviderName: SignInWithApple
    #     ProviderType: SignInWithApple
    #     ProviderDetails:
    #       client_id: ${self:custom.apple.servicesId}
    #       team_id: ${self:custom.apple.teamId}
    #       key_id: ${self:custom.apple.keyId}
    #       private_key: ${self:custom.apple.privateKey}
    #       authorize_scopes: "name email"
    #     AttributeMapping:
    #       email: email
    #       given_name: firstName
    #       family_name: lastName
    #       username: sub

    WebCognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      DependsOn:
        - GoogleIdentityProvider
        # - AppleIdentityProvider  # Uncomment when Apple is configured
      Properties:
        ClientName: web
        UserPoolId: !Ref CognitoUserPool
        ExplicitAuthFlows:
          - ALLOW_USER_SRP_AUTH
          - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
        PreventUserExistenceErrors: ENABLED
        SupportedIdentityProviders:
          - COGNITO
          - Google
          # - SignInWithApple  # Uncomment when Apple is configured
        AllowedOAuthFlows:
          - code
        AllowedOAuthScopes:
          - email
          - openid
          - profile
        AllowedOAuthFlowsUserPoolClient: true
        CallbackURLs:
          - furcircle://callback
          - http://localhost:8100/callback
        LogoutURLs:
          - furcircle://logout
          - http://localhost:8100/logout

    ServerCognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: server
        UserPoolId: !Ref CognitoUserPool
        ExplicitAuthFlows:
          - ALLOW_ADMIN_USER_PASSWORD_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
        PreventUserExistenceErrors: ENABLED

    # Cognito Domain for hosted UI (required for social login)
    CognitoUserPoolDomain:
      Type: AWS::Cognito::UserPoolDomain
      Properties:
        Domain: ${self:service}-${sls:stage}
        UserPoolId: !Ref CognitoUserPool

    # Identity Pool for federated identities (Apple Sign-In, etc.)
    CognitoIdentityPool:
      Type: AWS::Cognito::IdentityPool
      Properties:
        IdentityPoolName: ${self:service}-${sls:stage}-identity
        AllowUnauthenticatedIdentities: false
        CognitoIdentityProviders:
          - ClientId: !Ref WebCognitoUserPoolClient
            ProviderName: !GetAtt CognitoUserPool.ProviderName
        # Apple Sign-In - uncomment and configure when you have Apple Developer credentials
        # SupportedLoginProviders:
        #   appleid.apple.com: "your.apple.service.id"

    # IAM role for authenticated users (from Cognito)
    CognitoAuthenticatedRole:
      Type: AWS::IAM::Role
      Properties:
        AssumeRolePolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Federated: cognito-identity.amazonaws.com
              Action: sts:AssumeRoleWithWebIdentity
              Condition:
                StringEquals:
                  cognito-identity.amazonaws.com:aud: !Ref CognitoIdentityPool
                ForAnyValue:StringLike:
                  cognito-identity.amazonaws.com:amr: authenticated
        Policies:
          - PolicyName: CognitoAuthorizedPolicy
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action:
                    - execute-api:Invoke
                  Resource:
                    - !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayRestApi}/${sls:stage}/GET/dogservices
                    - !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayRestApi}/${sls:stage}/GET/dogservices/*
                    - !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayRestApi}/${sls:stage}/POST/dogservices/search
                    - !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayRestApi}/${sls:stage}/GET/categories
                    - !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayRestApi}/${sls:stage}/GET/categories/*
                    - !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayRestApi}/${sls:stage}/POST/chatbot/chat
                    - !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayRestApi}/${sls:stage}/GET/chatbot/conversations
                    - !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayRestApi}/${sls:stage}/GET/chatbot/history/*
                    - !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayRestApi}/${sls:stage}/GET/businesses/me
                    - !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayRestApi}/${sls:stage}/PUT/businesses/*
                    - !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayRestApi}/${sls:stage}/POST/bookings
                    - !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayRestApi}/${sls:stage}/GET/bookings
                    - !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayRestApi}/${sls:stage}/GET/bookings/business

    # Attach roles to Identity Pool
    CognitoIdentityPoolRoleAttachment:
      Type: AWS::Cognito::IdentityPoolRoleAttachment
      Properties:
        IdentityPoolId: !Ref CognitoIdentityPool
        Roles:
          authenticated: !GetAtt CognitoAuthenticatedRole.Arn

  Outputs:
    DogServiceTableName:
      Value: !Ref DogServiceTable
    ServiceCategoryTableName:
      Value: !Ref ServiceCategoryTable
    ChatConversationTableName:
      Value: !Ref ChatConversationTable
    DogBusinessTableName:
      Value: !Ref DogBusinessTable
    BookingTableName:
      Value: !Ref BookingTable
    PetTableName:
      Value: !Ref PetTable
    ApiEndpoint:
      Value: !Sub "https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/${sls:stage}"

    CognitoUserPoolId:
      Value: !Ref CognitoUserPool

    CognitoUserPoolArn:
      Value: !GetAtt CognitoUserPool.Arn

    CognitoUserPoolWebClientId:
      Value: !Ref WebCognitoUserPoolClient

    CognitoUserPoolServerClientId:
      Value: !Ref ServerCognitoUserPoolClient

    CognitoIdentityPoolId:
      Value: !Ref CognitoIdentityPool

    CognitoDomain:
      Value: !Sub "${self:service}-${sls:stage}.auth.${AWS::Region}.amazoncognito.com"

plugins:
  - serverless-export-env
  - serverless-iam-roles-per-function

custom:
  export-env:
    overwrite: true

  # Google OAuth credentials - get from https://console.cloud.google.com/apis/credentials
  # Create OAuth 2.0 Client ID -> Web application
  # Add redirect URI: https://${self:service}-${sls:stage}.auth.us-east-1.amazoncognito.com/oauth2/idpresponse
  google:
    clientId: ${env:GOOGLE_CLIENT_ID, 'PLACEHOLDER_GOOGLE_CLIENT_ID'}
    clientSecret: ${env:GOOGLE_CLIENT_SECRET, 'PLACEHOLDER_GOOGLE_CLIENT_SECRET'}

  # Apple Sign-In credentials - get from https://developer.apple.com/account
  # 1. Create App ID with Sign in with Apple
  # 2. Create Services ID for Sign in with Apple
  # 3. Create Key with Sign in with Apple enabled
  apple:
    teamId: ${env:APPLE_TEAM_ID, 'PLACEHOLDER_APPLE_TEAM_ID'}
    keyId: ${env:APPLE_KEY_ID, 'PLACEHOLDER_APPLE_KEY_ID'}
    servicesId: ${env:APPLE_SERVICES_ID, 'PLACEHOLDER_APPLE_SERVICES_ID'}
    privateKey: ${env:APPLE_PRIVATE_KEY, 'PLACEHOLDER_APPLE_PRIVATE_KEY'}
