name: Claude PR Review

on:
  pull_request:
    branches: [ main ]
  issue_comment:
    types: [ created ]

jobs:
  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v3

      - name: Build review pipeline instructions
        id: instructions
        run: |
          {
            echo "You are running a four-phase automated review pipeline for this FurCircle PR."
            echo "Run ALL four phases in order. Post ONE combined report at the end with a section for each phase."
            echo "Skip the 'npm test' step in Phase 3 — tests are run separately by the deploy pipeline."
            echo ""
            echo "================================================================"
            echo "PHASE 1 — CODE QUALITY REVIEW"
            echo "================================================================"
            cat .claude/agents/pr-reviewer.md
            echo ""
            echo "================================================================"
            echo "PHASE 2 — SECURITY REVIEW"
            echo "================================================================"
            cat .claude/agents/security-reviewer.md
            echo ""
            echo "================================================================"
            echo "PHASE 3 — PRE-COMMIT CHECKS"
            echo "================================================================"
            cat .claude/skills/pre-commit-review/SKILL.md
            echo ""
            echo "================================================================"
            echo "PHASE 4 — FIX ALL AUTO-FIXABLE ISSUES"
            echo "================================================================"
            cat .claude/skills/fix-pr-issues/SKILL.md
          } > /tmp/pipeline.txt
          echo "content<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/pipeline.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: "@claude"
          prompt: ${{ steps.instructions.outputs.content }}
